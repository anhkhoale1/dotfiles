# --- BASIC SETTINGS ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g set-clipboard on
setw -g mode-keys vi
set -g status-position top
set -g allow-rename off
set -g base-index 1
setw -g pane-base-index 1

# --- KEY BINDINGS (UNTOUCHED) ---
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# Split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Move between splits
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -n C-h resize-pane -L 5
bind -n C-j resize-pane -D 5
bind -n C-k resize-pane -U 5
bind -n C-l resize-pane -R 5

# Move between windows
bind H previous-window
bind L next-window

# Copy mode (vi style)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Kill server
bind K confirm-before -p "Kill ALL tmux sessions? (y/n)" kill-server

# --- VISUAL / STATUS BAR (Minimalist) ---
set -g status-style "bg=default" # Transparent background

# Left: Session name & Path
set -g status-left-length 100
set -g status-left "#{?client_prefix,#[bg=yellow]#[fg=black]#[bold]  #S ,#[fg=cyan]#[bold]  #S }#[pad=0]#[bg=default]#[fg=white] | #[fg=blue]󰉖 #{b:pane_current_path}"

# Windows status
set -g status-justify centre
set -g window-status-separator ""
set -g window-status-format "#[fg=colour244] #W "
set -g window-status-current-format "#[fg=white,bg=colour238,bold] #W "

# Right: Date & Timset -g status-left-length 100
set -g status-right-length 100
set -g status-right "#[fg=yellow]󰭦 %Y-%m-%d #[fg=white]| #[fg=green]󰅐 %H:%M "


# Pane borders
set -g pane-active-border-style "fg=brightcyan"
set -g pane-border-style "fg=grey"

set -g @plugin 'tmux-plugins/tpm'

run '~/.tmux/plugins/tpm/tpm'
